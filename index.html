function OverviewTab({year}){const d=DATA[year];if(!d)return null;const validMonths=d.monthly.filter(m=>m.close!=null);const lastMonth=validMonths[validMonths.length-1];const avgBal=validMonths.reduce((s,m)=>s+m.avg,0)/validMonths.length;const highBal=Math.max(...validMonths.map(m=>m.high));const lowBal=Math.min(...validMonths.map(m=>m.low));const totalNet=validMonths.reduce((s,m)=>s+(m.net||0),0);const hiLo=highBal-lowBal;const chartMonths=d.monthly.map((m,i)=>{if(m.close==null)return{...m,roll3:null};const w=d.monthly.slice(Math.max(0,i-2),i+1).filter(x=>x.close!=null);const roll3=w.length>=2?w.reduce((s,x)=>s+x.close,0)/w.length:null;return{...m,roll3};});return(<div><div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:24}}><KPI label={`${year} LAST BALANCE`} value={fmt(lastMonth?.close)} sub={lastMonth?.m+" close"}/><KPI label={`${year} AVG BALANCE`} value={fmt(avgBal)} sub={`High: ${fmt(highBal)} · Low: ${fmt(lowBal)}`}/><KPI label={`${year} NET FLOW`} value={fmtNet(totalNet)} accent={totalNet>=0?C.green:C.red}/><KPI label={`${validMonths.length} FISCAL MONTHS`} value={fmt(hiLo)} sub="High-low range"/></div><div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"20px 16px",marginBottom:20}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}><div style={{fontSize:14,fontWeight:700,color:C.text}}>Monthly closing balance</div><div style={{display:"flex",gap:16,fontSize:12}}><span style={{color:C.navy}}>{"\u25A0"} Close</span><span style={{color:C.amber}}>{"\u2014"} 3-mo avg</span></div></div><ResponsiveContainer width="100%" height={280}><ComposedChart data={chartMonths} margin={{top:5,right:10,left:10,bottom:5}}><CartesianGrid strokeDasharray="3 3" stroke={C.border}/><XAxis dataKey="m" tick={{fill:C.textDim,fontSize:12}} axisLine={{stroke:C.border}}/><YAxis tick={{fill:C.textDim,fontSize:11}} axisLine={{stroke:C.border}} tickFormatter={v=>fmt(v)}/><Tooltip content={<ChartTooltip/>}/><Bar dataKey="close" name="Closing Balance" fill={C.navy} radius={[4,4,0,0]}/><Line dataKey="roll3" name="3-Month Avg" type="monotone" stroke={C.amber} strokeWidth={2.5} dot={{r:4,fill:C.amber,stroke:C.bg,strokeWidth:2}} connectNulls={false}/></ComposedChart></ResponsiveContainer></div><div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"20px 16px"}}><div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:16}}>Quarterly trend</div><ResponsiveContainer width="100%" height={220}><ComposedChart data={d.quarterly} margin={{top:5,right:10,left:10,bottom:5}}><CartesianGrid strokeDasharray="3 3" stroke={C.border}/><XAxis dataKey="q" tick={{fill:C.textDim,fontSize:12}} axisLine={{stroke:C.border}}/><YAxis tick={{fill:C.textDim,fontSize:11}} axisLine={{stroke:C.border}} tickFormatter={v=>fmt(v)}/><Tooltip content={<ChartTooltip/>}/><Bar dataKey="close" name="Quarter Close" fill={C.teal} radius={[4,4,0,0]} opacity={0.6}/><Line dataKey="avg" name="Quarter Avg" type="monotone" stroke={C.green} strokeWidth={2} dot={{r:5,fill:C.green}}/></ComposedChart></ResponsiveContainer></div></div>);}

// ═══════════════ FORECAST TAB ═══════════════
function ForecastTooltip({active,payload,label}){if(!active||!payload?.length)return null;const d=payload[0]?.payload;if(!d)return null;const isForecast=d.forecast!=null;return(<div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"12px 16px",boxShadow:"0 8px 32px rgba(0,0,0,0.5)"}}><div style={{color:C.text,fontWeight:700,fontSize:14,marginBottom:6,borderBottom:`1px solid ${C.border}`,paddingBottom:6}}>{label}</div>{!isForecast&&d.close!=null&&<div style={{display:"flex",justifyContent:"space-between",gap:24,padding:"3px 0"}}><span style={{color:C.teal,fontSize:13}}>Actual:</span><span style={{color:C.white,fontWeight:600,fontSize:13,fontFamily:"monospace"}}>{fmtFull(d.close)}</span></div>}{isForecast&&<><div style={{display:"flex",justifyContent:"space-between",gap:24,padding:"3px 0"}}><span style={{color:C.green,fontSize:13}}>High:</span><span style={{color:C.white,fontWeight:600,fontSize:13,fontFamily:"monospace"}}>{fmtFull(Math.round(d.high))}</span></div><div style={{display:"flex",justifyContent:"space-between",gap:24,padding:"3px 0"}}><span style={{color:C.textDim,fontSize:13}}>Low:</span><span style={{color:C.white,fontWeight:600,fontSize:13,fontFamily:"monospace"}}>{fmtFull(Math.round(d.low))}</span></div><div style={{display:"flex",justifyContent:"space-between",gap:24,padding:"3px 0"}}><span style={{color:C.amber,fontSize:13}}>Projected:</span><span style={{color:C.white,fontWeight:600,fontSize:13,fontFamily:"monospace"}}>{fmtFull(Math.round(d.forecast))}</span></div></>}</div>);}

function ForecastTab(){const[horizon,setHorizon]=useState("3m");const[useAllData,setUseAllData]=useState(true);const horizons={"1m":1,"3m":3,"6m":6,"1y":12};const hMonths=horizons[horizon];const allCloses=[];YEARS.forEach(y=>{DATA[y]?.monthly.forEach((m,i)=>{if(m.close!=null)allCloses.push({idx:(y-YEARS[0])*12+i,mi:i,close:m.close,label:m.m+" "+y});});});const sourceData=useAllData?allCloses:allCloses.slice(-24);const n=sourceData.length;const xMean=sourceData.reduce((s,d)=>s+d.idx,0)/n;const yMean=sourceData.reduce((s,d)=>s+d.close,0)/n;let num=0,den=0;sourceData.forEach(d=>{num+=(d.idx-xMean)*(d.close-yMean);den+=(d.idx-xMean)**2;});const slope=den?num/den:0;const intercept=yMean-slope*xMean;const residualsByMonth={};sourceData.forEach(d=>{const trend=slope*d.idx+intercept;const resid=d.close-trend;if(!residualsByMonth[d.mi])residualsByMonth[d.mi]=[];residualsByMonth[d.mi].push(resid);});const seasonalIndex={};for(let i=0;i<12;i++){const vals=residualsByMonth[i]||[];seasonalIndex[i]=vals.length>0?vals.reduce((s,v)=>s+v,0)/vals.length:0;}const adjResiduals=sourceData.map(d=>d.close-(slope*d.idx+intercept+seasonalIndex[d.mi]));const sse=adjResiduals.reduce((s,r)=>s+r*r,0);const stdErr=Math.sqrt(sse/Math.max(1,n-2));const lastIdx=allCloses[allCloses.length-1]?.idx||0;const forecastData=allCloses.map(d=>({...d,forecast:null,high:null,low:null}));const forecastMonths=[];const startFiscalMonth=3;for(let i=1;i<=hMonths;i++){const idx=lastIdx+i;const mi=(startFiscalMonth+i-1)%12;const yr=2026+Math.floor((startFiscalMonth+i-1)/12);const trendVal=slope*idx+intercept;const seasonal=seasonalIndex[mi]||0;const val=trendVal+seasonal;const band=stdErr*(1+0.3*i);const label=FM[mi]+" "+yr;forecastMonths.push({idx,mi,close:null,forecast:Math.max(0,val),high:Math.max(0,val+band),low:Math.max(0,val-band),seasonal:Math.round(seasonal),label});}const recentActuals=forecastData.slice(-24);const chartData=[...recentActuals,...forecastMonths];const lastActual=allCloses[allCloses.length-1]?.close||0;const endForecast=forecastMonths[forecastMonths.length-1]?.forecast||0;const endHigh=forecastMonths[forecastMonths.length-1]?.high||0;const endLow=forecastMonths[forecastMonths.length-1]?.low||0;const sortedForecast=[...forecastMonths].sort((a,b)=>b.seasonal-a.seasonal);const strongMonth=sortedForecast[0];const weakMonth=sortedForecast[sortedForecast.length-1];const dataSourceLabel=useAllData?`all ${n} fiscal months (${YEARS[0]}-${YEARS[YEARS.length-1]})`:`the most recent ${n} fiscal months`;const seasonalNote=forecastMonths.length>1?` The seasonal model adjusts each projected month based on patterns derived from ${dataSourceLabel}.`+(strongMonth&&strongMonth.seasonal>0?` ${strongMonth.label} is seasonally adjusted upward by ${fmtFull(strongMonth.seasonal)} based on historical strength in that period.`:"")+(weakMonth&&weakMonth.seasonal<0?` ${weakMonth.label} is adjusted downward by ${fmtFull(Math.abs(weakMonth.seasonal))} reflecting historical weakness.`:""):` The seasonal adjustment for this month is ${fmtFull(forecastMonths[0]?.seasonal||0)} based on ${dataSourceLabel}.`;const summaryText=horizon==="1m"?`Based on seasonal trend analysis across ${dataSourceLabel}, the projected closing balance for ${forecastMonths[0]?.label} is approximately ${fmtFull(Math.round(endForecast))}, with a predicted range of ${fmtFull(Math.round(endLow))} (low) to ${fmtFull(Math.round(endHigh))} (optimistic).${seasonalNote}`:horizon==="3m"?`The three-month seasonal forecast (using ${dataSourceLabel}) projects the cash position through ${forecastMonths[forecastMonths.length-1]?.label}, reaching approximately ${fmtFull(Math.round(endForecast))} with a predicted range between ${fmtFull(Math.round(endLow))} (low) and ${fmtFull(Math.round(endHigh))} (optimistic).${seasonalNote} The confidence band widens with each projected month, reflecting increasing uncertainty.`:horizon==="6m"?`Over the six-month horizon through ${forecastMonths[forecastMonths.length-1]?.label}, the seasonal model (using ${dataSourceLabel}) projects the balance at approximately ${fmtFull(Math.round(endForecast))}, with the prediction interval spanning from ${fmtFull(Math.round(endLow))} (low) to ${fmtFull(Math.round(endHigh))} (optimistic).${seasonalNote} The projection captures cyclical tendencies but should be used as a directional indicator rather than a precise prediction.`:`The twelve-month seasonal forecast (using ${dataSourceLabel}) extends through ${forecastMonths[forecastMonths.length-1]?.label}, projecting a balance of approximately ${fmtFull(Math.round(endForecast))} with a prediction range of ${fmtFull(Math.round(endLow))} (low) to ${fmtFull(Math.round(endHigh))} (optimistic).${seasonalNote} At this horizon the model captures the full annual cycle, including the typical mid-year trough and second-half recovery pattern.`;return(<div><div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>{Object.keys(horizons).map(h=><button key={h} onClick={()=>setHorizon(h)} style={{padding:"8px 18px",borderRadius:6,border:`1px solid ${horizon===h?C.teal:C.border}`,background:horizon===h?"rgba(0,180,216,0.15)":"transparent",color:horizon===h?C.teal:C.textDim,fontSize:13,fontWeight:600,cursor:"pointer"}}>{h==="1m"?"1 Month":h==="3m"?"3 Months":h==="6m"?"6 Months":"1 Year"}</button>)}</div><div style={{display:"flex",gap:8,marginBottom:20,alignItems:"center"}}><span style={{color:C.textDim,fontSize:12}}>Data source:</span><button onClick={()=>setUseAllData(true)} style={{padding:"5px 14px",borderRadius:6,fontSize:12,fontWeight:600,cursor:"pointer",transition:"all 0.15s",border:`1px solid ${useAllData?C.purple:C.border}`,background:useAllData?"rgba(167,139,250,0.15)":"transparent",color:useAllData?C.purple:C.textDim}}>All history ({allCloses.length} months)</button><button onClick={()=>setUseAllData(false)} style={{padding:"5px 14px",borderRadius:6,fontSize:12,fontWeight:600,cursor:"pointer",transition:"all 0.15s",border:`1px solid ${!useAllData?C.purple:C.border}`,background:!useAllData?"rgba(167,139,250,0.15)":"transparent",color:!useAllData?C.purple:C.textDim}}>Recent 24 months</button></div><div style={{display:"flex",gap:12,marginBottom:20,flexWrap:"wrap"}}><KPI label="CURRENT BALANCE" value={fmt(lastActual)} sub="Fiscal Mar 2026 close"/><KPI label="FORECAST END" value={fmt(endForecast)} sub={forecastMonths[forecastMonths.length-1]?.label}/><KPI label="FORECAST HIGH" value={fmt(endHigh)} sub="Optimistic bound" accent={C.green}/><KPI label="FORECAST LOW" value={fmt(endLow)} sub="Lower bound" accent={C.red}/></div><div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"20px 16px",marginBottom:20}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}><div style={{fontSize:14,fontWeight:700,color:C.text}}>Seasonal forecast</div><div style={{display:"flex",gap:16,fontSize:12}}><span style={{color:C.teal}}>{"\u2014"} Actual</span><span style={{color:C.amber}}>-- Projected</span><span style={{color:"rgba(0,180,216,0.35)"}}>{"\u25A0"} High/Low range</span></div></div><ResponsiveContainer width="100%" height={350}><ComposedChart data={chartData} margin={{top:5,right:10,left:10,bottom:5}}><defs><linearGradient id="bandGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={C.teal} stopOpacity={0.18}/><stop offset="100%" stopColor={C.teal} stopOpacity={0.04}/></linearGradient></defs><CartesianGrid strokeDasharray="3 3" stroke={C.border}/><XAxis dataKey="label" tick={{fill:C.textDim,fontSize:10}} axisLine={{stroke:C.border}} interval={Math.max(0,Math.floor(chartData.length/12))}/><YAxis tick={{fill:C.textDim,fontSize:11}} axisLine={{stroke:C.border}} tickFormatter={v=>fmt(v)}/><Tooltip content={<ForecastTooltip/>}/><Area dataKey="high" type="monotone" stroke="none" fill="url(#bandGrad)" connectNulls={false}/><Area dataKey="low" type="monotone" stroke="none" fill={C.bg} connectNulls={false}/><Line dataKey="high" name="High Bound" type="monotone" stroke={C.green} strokeWidth={1} strokeDasharray="4 3" dot={false} connectNulls={false}/><Line dataKey="low" name="Low Bound" type="monotone" stroke={C.textMuted} strokeWidth={1} strokeDasharray="4 3" dot={false} connectNulls={false}/><Line dataKey="close" name="Actual" type="monotone" stroke={C.teal} strokeWidth={2} dot={{r:3,fill:C.teal}} connectNulls={false}/><Line dataKey="forecast" name="Projected" type="monotone" stroke={C.amber} strokeWidth={2.5} strokeDasharray="6 3" dot={{r:5,fill:C.bg,stroke:C.amber,strokeWidth:2}} connectNulls={false}/></ComposedChart></ResponsiveContainer></div>{forecastMonths.length>1&&<div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"20px 16px",marginBottom:20}}><div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:12}}>Seasonal adjustments by projected month</div><div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}><thead><tr>{["Month","Trend","Seasonal Adj","Projected","Low","Optimistic"].map(h=><th key={h} style={{background:C.cardAlt,color:C.textDim,padding:"8px 12px",textAlign:h==="Month"?"left":"right",borderBottom:`1px solid ${C.border}`,fontSize:11,textTransform:"uppercase",letterSpacing:0.5}}>{h}</th>)}</tr></thead><tbody>{forecastMonths.map((r,i)=><tr key={i} style={{borderBottom:`1px solid ${C.border}`}}><td style={{padding:"8px 12px",color:C.text,fontWeight:600}}>{r.label}</td><td style={{padding:"8px 12px",color:C.textDim,textAlign:"right",fontFamily:"monospace"}}>{fmtFull(Math.round(slope*r.idx+intercept))}</td><td style={{padding:"8px 12px",color:r.seasonal>=0?C.green:C.red,textAlign:"right",fontWeight:600,fontFamily:"monospace"}}>{r.seasonal>=0?"+":""}{fmtFull(r.seasonal)}</td><td style={{padding:"8px 12px",color:C.amber,textAlign:"right",fontWeight:600,fontFamily:"monospace"}}>{fmtFull(Math.round(r.forecast))}</td><td style={{padding:"8px 12px",color:C.textMuted,textAlign:"right",fontFamily:"monospace"}}>{fmtFull(Math.round(r.low))}</td><td style={{padding:"8px 12px",color:C.green,textAlign:"right",fontFamily:"monospace"}}>{fmtFull(Math.round(r.high))}</td></tr>)}</tbody></table></div></div>}<div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"20px 24px"}}><div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:12}}>Forecast summary</div><p style={{color:C.textDim,fontSize:14,lineHeight:1.7,margin:0}}>{summaryText}</p></div></div>);}

// ═══════════════ INSIGHTS TAB ═══════════════
function InsightsTab(){const monthAvgs=FM.map((m,i)=>{const vals=YEARS.map(y=>DATA[y]?.monthly[i]?.close).filter(v=>v!=null);return{m,avg:vals.length?vals.reduce((s,v)=>s+v,0)/vals.length:null,count:vals.length};}).filter(d=>d.avg!=null);const bestMonth=monthAvgs.reduce((best,d)=>d.avg>(best?.avg||0)?d:best,null);const worstMonth=monthAvgs.reduce((worst,d)=>d.avg<(worst?.avg||Infinity)?d:worst,null);const QMap={Q1:[0,1,2],Q2:[3,4,5],Q3:[6,7,8],Q4:[9,10,11]};const quarterAvgs=Object.entries(QMap).map(([q,idxs])=>{const vals=[];YEARS.forEach(y=>{const qCloses=idxs.map(i=>DATA[y]?.monthly[i]?.close).filter(v=>v!=null);if(qCloses.length>0)vals.push(qCloses.reduce((s,v)=>s+v,0)/qCloses.length);});return{q,avg:vals.length?vals.reduce((s,v)=>s+v,0)/vals.length:null};}).filter(d=>d.avg!=null);const bestQuarter=quarterAvgs.reduce((best,d)=>d.avg>(best?.avg||0)?d:best,null);const worstQuarter=quarterAvgs.reduce((worst,d)=>d.avg<(worst?.avg||Infinity)?d:worst,null);return(<div><div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"20px 16px",marginBottom:20}}><div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:16}}>Average closing balance by fiscal month</div><ResponsiveContainer width="100%" height={280}><BarChart data={monthAvgs} margin={{top:5,right:10,left:10,bottom:5}}><CartesianGrid strokeDasharray="3 3" stroke={C.border}/><XAxis dataKey="m" tick={{fill:C.textDim,fontSize:12}} axisLine={{stroke:C.border}}/><YAxis tick={{fill:C.textDim,fontSize:11}} axisLine={{stroke:C.border}} tickFormatter={v=>fmt(v)}/><Tooltip content={<ChartTooltip/>}/><Bar dataKey="avg" name="Avg Close (all years)" fill={C.purple} radius={[4,4,0,0]}/></BarChart></ResponsiveContainer></div><div style={{display:"flex",gap:12,marginBottom:12,flexWrap:"wrap"}}><div style={{flex:1,minWidth:220,background:"rgba(16,185,129,0.08)",border:"1px solid rgba(16,185,129,0.3)",borderRadius:10,padding:"18px 20px"}}><div style={{fontSize:11,color:C.green,textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>STRONGEST FISCAL MONTH</div><div style={{fontSize:24,fontWeight:800,color:C.green}}>{bestMonth?.m}</div><div style={{fontSize:13,color:C.textDim,marginTop:4}}>Avg closing balance: {fmtFull(Math.round(bestMonth?.avg||0))}</div></div><div style={{flex:1,minWidth:220,background:"rgba(206,32,47,0.08)",border:"1px solid rgba(206,32,47,0.3)",borderRadius:10,padding:"18px 20px"}}><div style={{fontSize:11,color:C.red,textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>WEAKEST FISCAL MONTH</div><div style={{fontSize:24,fontWeight:800,color:C.red}}>{worstMonth?.m}</div><div style={{fontSize:13,color:C.textDim,marginTop:4}}>Avg closing balance: {fmtFull(Math.round(worstMonth?.avg||0))}</div></div></div><div style={{display:"flex",gap:12,marginBottom:20,flexWrap:"wrap"}}><div style={{flex:1,minWidth:220,background:"rgba(16,185,129,0.08)",border:"1px solid rgba(16,185,129,0.3)",borderRadius:10,padding:"18px 20px"}}><div style={{fontSize:11,color:C.green,textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>STRONGEST QUARTER</div><div style={{fontSize:24,fontWeight:800,color:C.green}}>{bestQuarter?.q}</div><div style={{fontSize:13,color:C.textDim,marginTop:4}}>Avg closing balance: {fmtFull(Math.round(bestQuarter?.avg||0))}</div></div><div style={{flex:1,minWidth:220,background:"rgba(206,32,47,0.08)",border:"1px solid rgba(206,32,47,0.3)",borderRadius:10,padding:"18px 20px"}}><div style={{fontSize:11,color:C.red,textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>WEAKEST QUARTER</div><div style={{fontSize:24,fontWeight:800,color:C.red}}>{worstQuarter?.q}</div><div style={{fontSize:13,color:C.textDim,marginTop:4}}>Avg closing balance: {fmtFull(Math.round(worstQuarter?.avg||0))}</div></div></div><div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"24px 28px"}}><div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:14}}>Seasonal cycle analysis</div><div style={{color:C.textDim,fontSize:14,lineHeight:1.8}}><p style={{margin:"0 0 14px 0"}}>Based on {YEARS.length} fiscal years of data ({YEARS[0]} through {YEARS[YEARS.length-1]}), the FS-Elliott Citibank cash account exhibits a well-defined seasonal pattern driven by the timing of large receipts, payroll disbursements, and intercompany transfers.</p><p style={{margin:"0 0 14px 0"}}><strong style={{color:C.green}}>Strongest periods:</strong> The cash position tends to peak during Fiscal {bestMonth?.m}, with an average closing balance of {fmtFull(Math.round(bestMonth?.avg||0))} across all available years. At the quarterly level, {bestQuarter?.q} is the strongest quarter with an average balance of {fmtFull(Math.round(bestQuarter?.avg||0))}.</p><p style={{margin:"0 0 14px 0"}}><strong style={{color:C.red}}>Weakest periods:</strong> Fiscal {worstMonth?.m} consistently shows the lowest average closing balance at {fmtFull(Math.round(worstMonth?.avg||0))}. {worstQuarter?.q} is the weakest quarter overall, averaging {fmtFull(Math.round(worstQuarter?.avg||0))}. The lowest single-month closing balance observed was $542,883 in Fiscal August 2023.</p><p style={{margin:"0 0 14px 0"}}><strong style={{color:C.text}}>Key cycle drivers:</strong> Biweekly ADP payroll disbursements of $600K to $1.1M create regular cash outflows. UK payroll transfers (approximately every four weeks) add $38K to $108K in periodic disbursements. Large wire transfers for project-related payments can cause single-day balance swings exceeding $500K.</p><p style={{margin:"0 0 14px 0"}}><strong style={{color:C.text}}>Multi-year trend:</strong> The overall cash position has trended downward from the {YEARS[0]} to {YEARS[1]} period (which saw balances frequently above $6M) to the {YEARS[YEARS.length-2]} to {YEARS[YEARS.length-1]} period (where balances have generally ranged between $3M and $5M).</p><p style={{margin:0,fontSize:12,color:C.textMuted,fontStyle:"italic"}}>Analysis reflects {YEARS.length} fiscal years ({YEARS[0]}-{YEARS[YEARS.length-1]}). Monthly averages for Jan-Mar include {YEARS.length} data points; Apr-Dec include {YEARS.length-1} (2026 is a partial year).</p></div></div></div>);}

// ═══════════════ MAIN DASHBOARD ═══════════════
function CashDashboard(){const[tab,setTab]=useState("Overview");const[year,setYear]=useState(2026);const tabs=["Overview","Detail","Year-over-year","Forecast","Insights"];return(<div style={{background:C.bg,minHeight:"100vh",color:C.text,fontFamily:"'Segoe UI', Tahoma, Geneva, Verdana, sans-serif"}}><div style={{padding:"20px 28px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:`1px solid ${C.border}`}}><div style={{display:"flex",alignItems:"center",gap:14}}><div style={{width:40,height:40,borderRadius:10,background:`linear-gradient(135deg, ${C.navy}, ${C.teal})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:800,color:C.white}}>FS</div><div><div style={{fontSize:17,fontWeight:700,color:C.white}}>FS-Elliott Co., LLC</div><div style={{fontSize:12,color:C.textDim}}>Cash position {"\u2014"} Citibank 10160-0000-01</div></div></div>{tab!=="Year-over-year"&&tab!=="Forecast"&&tab!=="Insights"&&<YearPills years={YEARS} selected={year} onSelect={setYear}/>}</div><div style={{padding:"16px 28px 40px"}}><Tabs tabs={tabs} active={tab} onChange={setTab}/>{tab==="Overview"&&<OverviewTab year={year}/>}{tab==="Detail"&&<DetailTab year={year}/>}{tab==="Year-over-year"&&<CompareTab/>}{tab==="Forecast"&&<ForecastTab/>}{tab==="Insights"&&<InsightsTab/>}</div><div style={{textAlign:"center",padding:"16px 0 24px",fontSize:11,color:C.textMuted,borderTop:`1px solid ${C.border}`}}>Internal Use Only {"\u00B7"} FS-Elliott Co., LLC {"\u00B7"} Citibank Acct # 31147312</div></div>);}

ReactDOM.render(React.createElement(CashDashboard), document.getElementById('root'));
